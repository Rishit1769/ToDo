# Production Nginx config for VPS edge reverse proxy.
# This file assumes Docker publishes frontend on 127.0.0.1:3000 and backend on 127.0.0.1:5000.
# Deploy this on host Nginx (not inside docker-compose) and adjust domain names/cert paths.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    server_tokens off;

    # Respect Cloudflare client IP if proxied through Cloudflare.
    # Keep this synced from https://www.cloudflare.com/ips/
    real_ip_header CF-Connecting-IP;

    # WebSocket upgrade map for backend proxying.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Frontend upstream (React static container).
    upstream todo_frontend {
        server 127.0.0.1:3000;
        keepalive 64;
    }

    # Backend upstream (Express API container).
    upstream todo_backend {
        server 127.0.0.1:5000;
        keepalive 64;
    }

    # Redirect HTTP to HTTPS for main site.
    server {
        listen 80;
        listen [::]:80;
        server_name yourdomain.com www.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # Redirect HTTP to HTTPS for API subdomain.
    server {
        listen 80;
        listen [::]:80;
        server_name api.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # Main frontend over HTTPS.
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            proxy_pass http://todo_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }

    # API over HTTPS.
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.yourdomain.com;

        ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;

        client_max_body_size 2m;

        location / {
            proxy_pass http://todo_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}
